<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Career Forge</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When a direct URL like /dashboard is hit, Pages returns 404.
    // This 404.html redirects to index.html with the path encoded as a query param.
    // index.html then reads it and restores the real URL via history.replaceState.
    var pathSegmentsToKeep = 1; // keep the repo name segment: /careerforge
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
