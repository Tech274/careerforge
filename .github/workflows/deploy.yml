name: Deploy to GitHub Pages + Supabase Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    # Only runs when SUPABASE_ACCESS_TOKEN secret is configured
    if: ${{ vars.SKIP_FUNCTIONS_DEPLOY != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy \
            --project-ref yewbzvyrzudhwhlarzlm \
            --no-verify-jwt

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: "true"
          VITE_SUPABASE_URL: "https://yewbzvyrzudhwhlarzlm.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_s7896Isgha0xarNkjL6rKQ_sllejfrk"
          VITE_SUPABASE_PROJECT_ID: "yewbzvyrzudhwhlarzlm"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
